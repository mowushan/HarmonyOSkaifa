<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸿蒙集训教程资料站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            padding: 40px 20px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #38bdf8;
            font-size: 2.2rem;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            border-color: rgba(56, 189, 248, 0.3);
        }
        h2 {
            color: #7dd3fc;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2 svg {
            width: 24px;
            height: 24px;
            fill: #7dd3fc;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .nav-item {
            background: rgba(56, 189, 248, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.15);
        }
        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.2), transparent);
            transition: all 0.6s ease;
        }
        .nav-item:hover::before {
            left: 100%;
        }
        .nav-item:hover {
            background: rgba(56, 189, 248, 0.15);
            transform: translateY(-3px);
            border-color: rgba(56, 189, 248, 0.4);
        }
        a {
            color: #e0f2fe;
            text-decoration: none;
            font-weight: 500;
            display: block;
        }
        .desc {
            margin-top: 40px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* 响应式适配 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            h1 {
                font-size: 1.8rem;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 鸿蒙集训教程资料站</h1>
            <p class="subtitle">一站式学习导航 · 第1-11周完整教程</p>
        </header>

        <div class="card">
            <h2>
                <svg viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2V9h2v8zm-2-4h2v2h-2v-2zm4 4h-2V9h2v8zm2-4h-2v2h2v-2z"/>
                </svg>
                教程总说明
            </h2>
            <div class="grid">

                <svg viewBox="0 0 24 24">

                </svg>
                周次资料导航
            </h2>
            <div class="grid">
                <div class="nav-item"><a href="第1周/index.html">第1周资料</a></div>
                <div class="nav-item"><a href="第2周/index.html">第2周资料</a></div>
                <div class="nav-item"><a href="第3周/index.html">第3周资料</a></div>
                <div class="nav-item"><a href="第4周/index.html">第4周资料</a></div>
                <div class="nav-item"><a href="第5周/index.html">第5周资料</a></div>
                <div class="nav-item"><a href="第6周/index.html">第6周资料</a></div>
                <div class="nav-item"><a href="第7周/index.html">第7周资料</a></div>
                <div class="nav-item"><a href="第8周/index.html">第8周资料</a></div>
                <div class="nav-item"><a href="第9周/index.html">第9周资料</a></div>
                <div class="nav-item"><a href="第10周/index.html">第10周资料</a></div>
                <div class="nav-item"><a href="第11周/index.html">第11周资料</a></div>
            </div>
        </div>

        <div class="desc">
            <p>所有资料均已上传，点击对应链接即可在线查看教案文件</p>
            <p>© 2026 鸿蒙集训教程资料站 | 设计：mowushan</p>
        </div>
    </div>
</body>
</html>
