    <style>

            background: #0f172a;
            color: #f1f5f9;

        ul {
            list-style: none;

        }
        a {
            color: #e0f2fe;
            text-decoration: none;
            padding: 10px 14px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            display: block;
            transition: 0.2s;
            text-align: center;
        }
        a:hover {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }
        .desc {

            text-align: center;
